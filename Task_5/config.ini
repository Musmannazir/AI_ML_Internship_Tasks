# Task 5 Configuration File
# Modify these settings to customize training behavior

[MODEL]
# Base model to fine-tune: distilgpt2, gpt2, or EleutherAI/gpt-neo-125M
model_name = distilgpt2

# Directory to save fine-tuned model
output_dir = ./fine_tuned_model

# Directory to cache downloaded models
cache_dir = ./model_cache

[TRAINING]
# Maximum sequence length during training
max_length = 128

# Batch size (reduce if out of memory)
batch_size = 8

# Number of training epochs
num_epochs = 3

# Learning rate
learning_rate = 2e-5

# Weight decay for regularization
weight_decay = 0.01

# Warmup steps
warmup_steps = 100

# Save checkpoint every N steps
save_steps = 100

# Keep only last N checkpoints
save_total_limit = 2

[GENERATION]
# Maximum length of generated responses
max_response_length = 100

# Number of beams for beam search
num_beams = 3

# Temperature (lower = more deterministic, higher = more creative)
temperature = 0.7

# Nucleus sampling parameter
top_p = 0.9

[SAFETY]
# Keywords that trigger crisis response
crisis_keywords = [
    "suicide", "kill myself", "hurt myself", "self harm",
    "want to die", "end my life", "overdose", "cut myself",
    "no point living", "better off dead", "give up"
]

# Emergency hotline numbers (customize for your region)
us_suicide_line = 988
crisis_text_line = "Text HOME to 741741"

[DATASET]
# EmpatheticDialogues dataset name
dataset_name = empathetic_dialogues

# Dataset split to use for training
dataset_split = train

# Maximum samples to use (-1 for all)
max_samples = -1
